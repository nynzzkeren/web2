<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNBT Tryout - Latihan Ujian Masuk PTN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: #161616;
            --bg-hover: #1e1e1e;
            --border: #2a2a2a;
            --border-light: #333333;
            --text-primary: #e8e8e8;
            --text-secondary: #888888;
            --text-muted: #555555;
            --accent: #e0e0e0;
            --accent-hover: #ffffff;
            --correct: #4ade80;
            --wrong: #f87171;
            --timer: #fbbf24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .landing {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
            text-align: center;
        }

        .landing h1 {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .landing .subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 60px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .difficulty-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            max-width: 600px;
            width: 100%;
            margin-bottom: 40px;
        }

        .diff-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .diff-card:hover {
            border-color: var(--border-light);
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(255,255,255,0.04);
        }

        .diff-card .diff-label {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .diff-card .diff-count {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
        }

        .diff-card .diff-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .diff-card.easy:hover { border-color: #4ade80; }
        .diff-card.normal:hover { border-color: #fbbf24; }
        .diff-card.hard:hover { border-color: #f87171; }

        .mode-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .mode-overlay.active { display: flex; }

        .mode-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        .mode-box h2 {
            font-size: 1.4rem;
            margin-bottom: 8px;
        }

        .mode-box .mode-sub {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        .mode-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .mode-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 18px 24px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: 'Inter', sans-serif;
        }

        .mode-btn:hover {
            border-color: var(--border-light);
            background: var(--bg-hover);
        }

        .mode-btn .mode-tag {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .mode-btn.exam .mode-tag { color: var(--timer); }

        .cancel-btn {
            margin-top: 20px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.85rem;
            cursor: pointer;
            padding: 8px 16px;
        }

        .cancel-btn:hover { color: var(--text-secondary); }

        .quiz-container {
            display: none;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        .quiz-container.active { display: block; }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
            position: sticky;
            top: 0;
            background: var(--bg-primary);
            z-index: 10;
        }

        .quiz-header .quiz-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .quiz-header .q-number {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .quiz-header .timer {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--timer);
            background: var(--bg-card);
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .quiz-header .timer.warning {
            color: var(--wrong);
            border-color: var(--wrong);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .quiz-header .exit-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quiz-header .exit-btn:hover {
            border-color: var(--wrong);
            color: var(--wrong);
        }

        .progress-track {
            height: 3px;
            background: var(--bg-card);
            border-radius: 2px;
            margin-bottom: 32px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            transition: width 0.4s ease;
            border-radius: 2px;
        }

        .question-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
        }

        .question-text {
            font-size: 1.15rem;
            line-height: 1.8;
            margin-bottom: 28px;
            font-weight: 500;
        }

        .question-text .q-num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-right: 8px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            background: var(--bg-secondary);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 16px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }

        .option:hover {
            border-color: var(--border-light);
            background: var(--bg-hover);
        }

        .option.selected {
            border-color: var(--accent);
            background: rgba(255,255,255,0.03);
        }

        .option.correct {
            border-color: var(--correct);
            background: rgba(74, 222, 128, 0.05);
        }

        .option.wrong {
            border-color: var(--wrong);
            background: rgba(248, 113, 113, 0.05);
        }

        .option .opt-letter {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-muted);
            min-width: 24px;
            margin-top: 2px;
        }

        .option.selected .opt-letter { color: var(--accent); }
        .option.correct .opt-letter { color: var(--correct); }
        .option.wrong .opt-letter { color: var(--wrong); }

        .option .opt-text {
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 32px;
        }

        .nav-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .nav-btn:hover {
            border-color: var(--border-light);
            background: var(--bg-hover);
        }

        .nav-btn.primary {
            background: var(--text-primary);
            color: var(--bg-primary);
            border-color: var(--text-primary);
        }

        .nav-btn.primary:hover {
            background: var(--accent-hover);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .q-navigator {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .q-dot {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .q-dot:hover { border-color: var(--border-light); }
        .q-dot.answered { background: var(--accent); color: var(--bg-primary); border-color: var(--accent); }
        .q-dot.current { border-color: var(--accent); color: var(--accent); }
        .q-dot.answered.current { background: var(--accent); color: var(--bg-primary); }

        .results-container {
            display: none;
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .results-container.active { display: block; }

        .results-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .results-header h2 {
            font-size: 1.6rem;
            margin-bottom: 8px;
        }

        .results-header .results-sub {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .score-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            margin-bottom: 32px;
        }

        .score-big {
            font-family: 'JetBrains Mono', monospace;
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .score-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }

        .score-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .stat-box {
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 16px;
        }

        .stat-box .stat-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .stat-box .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .stat-box.correct .stat-val { color: var(--correct); }
        .stat-box.wrong .stat-val { color: var(--wrong); }
        .stat-box.empty .stat-val { color: var(--text-muted); }

        .review-section {
            margin-top: 32px;
        }

        .review-section h3 {
            font-size: 1.1rem;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .review-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
        }

        .review-item .review-q {
            font-size: 0.95rem;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .review-item .review-ans {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .review-item .review-ans span {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
        }

        .review-item .review-ans .ans-correct { color: var(--correct); }
        .review-item .review-ans .ans-wrong { color: var(--wrong); }

        .action-btns {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 40px;
        }

        .action-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .action-btn:hover {
            border-color: var(--border-light);
            background: var(--bg-hover);
        }

        .action-btn.primary {
            background: var(--text-primary);
            color: var(--bg-primary);
            border-color: var(--text-primary);
        }

        .action-btn.primary:hover {
            background: var(--accent-hover);
        }

        @media (max-width: 600px) {
            .landing h1 { font-size: 2rem; }
            .difficulty-grid { grid-template-columns: 1fr; }
            .score-stats { grid-template-columns: 1fr; }
            .quiz-header { flex-wrap: wrap; gap: 10px; }
            .question-card { padding: 20px; }
            .score-big { font-size: 3rem; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

        .fade-in {
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="landing" id="landing">
    <h1>SNBT Tryout</h1>
    <p class="subtitle">Latihan Ujian Masuk PTN</p>

    <div class="difficulty-grid">
        <div class="diff-card easy" onclick="selectDifficulty('easy')">
            <div class="diff-label">Easy</div>
            <div class="diff-count">30</div>
            <div class="diff-desc">soal</div>
        </div>
        <div class="diff-card normal" onclick="selectDifficulty('normal')">
            <div class="diff-label">Normal</div>
            <div class="diff-count">50</div>
            <div class="diff-desc">soal</div>
        </div>
        <div class="diff-card hard" onclick="selectDifficulty('hard')">
            <div class="diff-label">Hard</div>
            <div class="diff-count">100</div>
            <div class="diff-desc">soal</div>
        </div>
    </div>

    <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 20px;">
        Total soal tersedia: 170 soal (acak setiap sesi)
    </p>
</div>

<div class="mode-overlay" id="modeOverlay">
    <div class="mode-box fade-in">
        <h2 id="modeTitle">Pilih Mode</h2>
        <p class="mode-sub" id="modeSub">Pilih cara pengerjaan soal</p>
        <div class="mode-options">
            <button class="mode-btn exam" onclick="startQuiz('exam')">
                <span>Mode Ujian</span>
                <span class="mode-tag">Dengan Timer</span>
            </button>
            <button class="mode-btn" onclick="startQuiz('practice')">
                <span>Mode Latihan</span>
                <span class="mode-tag">Tanpa Batas Waktu</span>
            </button>
        </div>
        <button class="cancel-btn" onclick="closeMode()">Batal</button>
    </div>
</div>

<div class="quiz-container" id="quizContainer">
    <div class="quiz-header">
        <div class="quiz-info">
            <span class="q-number" id="qNumber">1 / 30</span>
            <span class="timer" id="timer" style="display:none;">00:00</span>
        </div>
        <button class="exit-btn" onclick="confirmExit()">Keluar</button>
    </div>

    <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>

    <div class="question-card fade-in" id="questionCard">
        <div class="question-text" id="questionText"></div>
        <div class="options-list" id="optionsList"></div>
    </div>

    <div class="nav-bar">
        <button class="nav-btn" id="prevBtn" onclick="prevQuestion()" disabled>Sebelumnya</button>
        <button class="nav-btn primary" id="nextBtn" onclick="nextQuestion()">Selanjutnya</button>
    </div>

    <div class="q-navigator" id="qNavigator"></div>
</div>

<div class="results-container" id="resultsContainer">
    <div class="results-header">
        <h2>Hasil Ujian</h2>
        <p class="results-sub" id="resultsSub"></p>
    </div>

    <div class="score-card">
        <div class="score-big" id="scoreBig">0</div>
        <div class="score-label">dari <span id="scoreTotal">30</span> soal</div>
        <div class="score-stats">
            <div class="stat-box correct">
                <div class="stat-val" id="statCorrect">0</div>
                <div class="stat-label">Benar</div>
            </div>
            <div class="stat-box wrong">
                <div class="stat-val" id="statWrong">0</div>
                <div class="stat-label">Salah</div>
            </div>
            <div class="stat-box empty">
                <div class="stat-val" id="statEmpty">0</div>
                <div class="stat-label">Kosong</div>
            </div>
        </div>
    </div>

    <div class="review-section" id="reviewSection">
        <h3>Review Jawaban</h3>
        <div id="reviewList"></div>
    </div>

    <div class="action-btns">
        <button class="action-btn" onclick="location.reload()">Ulangi</button>
        <button class="action-btn primary" onclick="showLanding()">Menu Utama</button>
    </div>
</div>

<script>

// ===== DATA SOAL SNBT (170 soal) =====
const allQuestions = [
    // PENALARAN UMUM (1-40)
    { q: "Jika semua A adalah B, dan beberapa B adalah C, maka...", options: ["Semua A adalah C", "Beberapa A mungkin C", "Tidak ada A yang C", "Semua C adalah A"], answer: 1, category: "Penalaran Umum" },
    { q: "Diberikan pernyataan: 'Setiap siswa yang rajin pasti lulus.' Jika Budi tidak lulus, maka...", options: ["Budi rajin", "Budi tidak rajin", "Budi mungkin rajin", "Tidak dapat disimpulkan"], answer: 1, category: "Penalaran Umum" },
    { q: "Seri: 2, 6, 12, 20, 30, ...", options: ["36", "40", "42", "44"], answer: 2, category: "Penalaran Umum" },
    { q: "Seri: 1, 1, 2, 3, 5, 8, ...", options: ["11", "12", "13", "14"], answer: 2, category: "Penalaran Umum" },
    { q: "Jika P > Q dan Q > R, maka...", options: ["P < R", "P = R", "P > R", "Tidak ada hubungan"], answer: 2, category: "Penalaran Umum" },
    { q: "Semua kucing adalah mamalia. Semua mamalia bernafas. Jadi...", options: ["Semua yang bernafas adalah kucing", "Semua kucing bernafas", "Beberapa kucing tidak bernafas", "Tidak ada kucing yang mamalia"], answer: 1, category: "Penalaran Umum" },
    { q: "Seri huruf: A, C, E, G, ...", options: ["H", "I", "J", "K"], answer: 1, category: "Penalaran Umum" },
    { q: "Diberikan: Jika hujan, maka jalan basah. Jalan tidak basah. Maka...", options: ["Hujan", "Tidak hujan", "Mungkin hujan", "Tidak dapat disimpulkan"], answer: 1, category: "Penalaran Umum" },
    { q: "Seri: 3, 6, 11, 18, 27, ...", options: ["36", "38", "40", "42"], answer: 1, category: "Penalaran Umum" },
    { q: "Jika X adalah Y, dan Y adalah Z, maka...", options: ["X mungkin Z", "X pasti Z", "X bukan Z", "Tidak ada hubungan"], answer: 1, category: "Penalaran Umum" },
    { q: "Seri: 81, 27, 9, 3, ...", options: ["0", "1", "2", "3"], answer: 1, category: "Penalaran Umum" },
    { q: "Diberikan: Tidak ada burung yang bisa hidup di air. Bebek bisa hidup di air. Maka...", options: ["Bebek adalah burung", "Bebek bukan burung", "Bebek mungkin burung", "Tidak dapat disimpulkan"], answer: 1, category: "Penalaran Umum" },
    { q: "Seri: 1, 4, 9, 16, 25, ...", options: ["30", "35", "36", "49"], answer: 2, category: "Penalaran Umum" },
    { q: "Jika A = B dan B = C, maka A ... C", options: ["<", ">", "=", "≠"], answer: 2, category: "Penalaran Umum" },
    { q: "Seri: 2, 3, 5, 7, 11, ...", options: ["12", "13", "14", "15"], answer: 1, category: "Penalaran Umum" },
    { q: "Semua dokter pandai. Siti pandai. Maka...", options: ["Siti dokter", "Siti bukan dokter", "Siti mungkin dokter", "Tidak dapat disimpulkan"], answer: 2, category: "Penalaran Umum" },
    { q: "Seri: 100, 50, 25, 12.5, ...", options: ["5", "6", "6.25", "7"], answer: 2, category: "Penalaran Umum" },
    { q: "Jika P maka Q. Jika Q maka R. Jika tidak R, maka...", options: ["P", "Tidak P", "Q", "Tidak dapat disimpulkan"], answer: 1, category: "Penalaran Umum" },
    { q: "Seri: Z, X, V, T, ...", options: ["R", "S", "Q", "P"], answer: 0, category: "Penalaran Umum" },

// ===== STATE =====
let selectedDifficulty = '';
let selectedMode = '';
let questions = [];
let currentQ = 0;
let answers = [];
let timerInterval = null;
let timeLeft = 0;
let totalTime = 0;

const difficultyConfig = {
    easy: { count: 30, time: 45 * 60 },    // 45 menit
    normal: { count: 50, time: 75 * 60 },   // 75 menit
    hard: { count: 100, time: 120 * 60 }    // 120 menit
};

// ===== UTILS =====
function shuffleArray(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function formatTime(seconds) {
    const m = Math.floor(seconds / 60).toString().padStart(2, '0');
    const s = (seconds % 60).toString().padStart(2, '0');
    return m + ':' + s;
}

// ===== NAVIGATION =====
function selectDifficulty(diff) {
    selectedDifficulty = diff;
    const config = difficultyConfig[diff];
    document.getElementById('modeTitle').textContent = 'Mode ' + diff.charAt(0).toUpperCase() + diff.slice(1) + ' (' + config.count + ' Soal)';
    document.getElementById('modeOverlay').classList.add('active');
}

function closeMode() {
    document.getElementById('modeOverlay').classList.remove('active');
}

function startQuiz(mode) {
    selectedMode = mode;
    closeMode();

    const config = difficultyConfig[selectedDifficulty];

    // Acak soal dari 170 soal
    const shuffled = shuffleArray(allQuestions);
    questions = shuffled.slice(0, config.count);

    currentQ = 0;
    answers = new Array(questions.length).fill(-1);

    // Setup timer
    const timerEl = document.getElementById('timer');
    if (mode === 'exam') {
        timeLeft = config.time;
        totalTime = config.time;
        timerEl.style.display = 'inline-block';
        timerEl.textContent = formatTime(timeLeft);
        timerEl.classList.remove('warning');
        startTimer();
    } else {
        timerEl.style.display = 'none';
    }

    // Tampilkan quiz
    document.getElementById('landing').style.display = 'none';
    document.getElementById('quizContainer').classList.add('active');
    document.getElementById('resultsContainer').classList.remove('active');

    renderQuestion();
    renderNavigator();
}

function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft--;
        const timerEl = document.getElementById('timer');
        timerEl.textContent = formatTime(timeLeft);

        if (timeLeft <= 300) { // 5 menit tersisa
            timerEl.classList.add('warning');
        }

        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            finishQuiz();
        }
    }, 1000);
}

function showLanding() {
    if (timerInterval) clearInterval(timerInterval);
    document.getElementById('landing').style.display = 'flex';
    document.getElementById('quizContainer').classList.remove('active');
    document.getElementById('resultsContainer').classList.remove('active');
}

function confirmExit() {
    if (confirm('Yakin ingin keluar? Progress akan hilang.')) {
        if (timerInterval) clearInterval(timerInterval);
        showLanding();
    }
}

// ===== RENDER =====
function renderQuestion() {
    const q = questions[currentQ];
    const letters = ['A', 'B', 'C', 'D'];

    document.getElementById('qNumber').textContent = (currentQ + 1) + ' / ' + questions.length;
    document.getElementById('progressFill').style.width = ((currentQ + 1) / questions.length * 100) + '%';

    document.getElementById('questionText').innerHTML =
        '<span class="q-num">[' + q.category + ']</span>' + q.q;

    let optsHtml = '';
    q.options.forEach((opt, i) => {
        const cls = answers[currentQ] === i ? 'selected' : '';
        optsHtml += '<div class="option ' + cls + '" onclick="selectOption(' + i + ')">' +
            '<span class="opt-letter">' + letters[i] + '</span>' +
            '<span class="opt-text">' + opt + '</span></div>';
    });
    document.getElementById('optionsList').innerHTML = optsHtml;

    // Update nav buttons
    document.getElementById('prevBtn').disabled = currentQ === 0;
    document.getElementById('nextBtn').textContent =
        currentQ === questions.length - 1 ? 'Selesai' : 'Selanjutnya';

    // Update navigator
    updateNavigator();

    // Re-trigger fade
    const card = document.getElementById('questionCard');
    card.classList.remove('fade-in');
    void card.offsetWidth;
    card.classList.add('fade-in');
}

function selectOption(idx) {
    answers[currentQ] = idx;
    renderQuestion();
}

function prevQuestion() {
    if (currentQ > 0) {
        currentQ--;
        renderQuestion();
    }
}

function nextQuestion() {
    if (currentQ < questions.length - 1) {
        currentQ++;
        renderQuestion();
    } else {
        finishQuiz();
    }
}

// ===== NAVIGATOR =====
function renderNavigator() {
    let html = '';
    for (let i = 0; i < questions.length; i++) {
        html += '<div class="q-dot" id="dot-' + i + '" onclick="goToQuestion(' + i + ')">' + (i + 1) + '</div>';
    }
    document.getElementById('qNavigator').innerHTML = html;
    updateNavigator();
}

function updateNavigator() {
    for (let i = 0; i < questions.length; i++) {
        const dot = document.getElementById('dot-' + i);
        if (!dot) continue;
        dot.className = 'q-dot';
        if (i === currentQ) dot.classList.add('current');
        if (answers[i] !== -1) dot.classList.add('answered');
    }
}

function goToQuestion(idx) {
    currentQ = idx;
    renderQuestion();
}

// ===== RESULTS =====
function finishQuiz() {
    if (timerInterval) clearInterval(timerInterval);

    let correct = 0, wrong = 0, empty = 0;
    questions.forEach((q, i) => {
        if (answers[i] === -1) empty++;
        else if (answers[i] === q.answer) correct++;
        else wrong++;
    });

    const total = questions.length;
    const score = correct;

    document.getElementById('quizContainer').classList.remove('active');
    document.getElementById('resultsContainer').classList.add('active');

    document.getElementById('resultsSub').textContent = 
        'Mode: ' + (selectedMode === 'exam' ? 'Ujian' : 'Latihan') + 
        ' | Level: ' + selectedDifficulty.charAt(0).toUpperCase() + selectedDifficulty.slice(1);

    document.getElementById('scoreBig').textContent = score;
    document.getElementById('scoreTotal').textContent = total;
    document.getElementById('statCorrect').textContent = correct;
    document.getElementById('statWrong').textContent = wrong;
    document.getElementById('statEmpty').textContent = empty;

    // Review
    let reviewHtml = '';
    questions.forEach((q, i) => {
        const letters = ['A', 'B', 'C', 'D'];
        const userAns = answers[i];
        const isCorrect = userAns === q.answer;
        const statusClass = userAns === -1 ? '' : (isCorrect ? 'ans-correct' : 'ans-wrong');
        const statusText = userAns === -1 ? 'Tidak dijawab' : 
            (isCorrect ? 'Benar' : 'Salah (Jawabanmu: ' + letters[userAns] + ')');

        reviewHtml += '<div class="review-item">' +
            '<div class="review-q">' + (i + 1) + '. ' + q.q + '</div>' +
            '<div class="review-ans">Jawaban benar: <span class="ans-correct">' + letters[q.answer] + '</span> | ' +
            '<span class="' + statusClass + '">' + statusText + '</span></div></div>';
    });
    document.getElementById('reviewList').innerHTML = reviewHtml;
}
